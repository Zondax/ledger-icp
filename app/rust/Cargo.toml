[package]
authors = ["Zondax GmbH <info@zondax.ch>"]
name = "rslib"
version = "0.1.0"
edition = "2021"
readme = "README.md"
resolver = "2"


[lib]
name = "rslib"
crate-type = ["staticlib"]

[dependencies]
no-std-compat = { version = "0.4.1" }
# bls_signature = { path = "../../../verify-bls-signatures", default-features = false, package = "ic-verify-bls-signature" }
# bls_signature = { path = "../verify-bls-signatures", default-features = false, package = "ic-verify-bls-signature" }
bls_signature = { git = "https://github.com/Zondax/verify-bls-signatures.git", branch = "feat/ledger", package = "ic-verify-bls-signature", default-features = false }

[dev-dependencies]
no-std-compat = { version = "0.4.1", features = ["std"] }
serde_json = "1.0.56"
hex = { version = "0.4" }
serde-json-core = { version = "0.4.0", features = ["std"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
sha2 = { version = "0.9.1" }
base64 = { version = "0.13.0" }


[target.'cfg(fuzzing)'.dependencies]
sha2 = { version = "0.9.1" }
no-std-compat = { version = "0.4.1", features = ["std"] }

[profile.release]
lto = false
codegen-units = 1
debug = false
opt-level = "z"

[profile.dev]
panic = "abort"
